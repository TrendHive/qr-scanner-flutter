name: domain_ui
description: "QR Scanner's domain UI library."
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.5.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core
  core_ui:
    path: ../core_ui
  domain:
    path: ../domain
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
